name: CoreDesignPreview
options:
  bundleIdPrefix: com.coredesign
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"

packages:
  CoreDesign:
    path: ../
    # 需要 xcodegen >= 2.46.0——2.45.4 会静默忽略此键(生成物零 trait 痕迹)。
    # 让预览宿主渲染 Blossom 主题,使它成为该主题的视觉验证载体。
    traits: ["Blossom"]
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    exactVersion: "0.14.0"

targets:
  CoreDesignPreview:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: CoreDesign
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"

  SnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CoreDesignPreview
      - package: SnapshotPreviews
        product: SnapshottingTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
