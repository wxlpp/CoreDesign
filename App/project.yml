# ⚠️ 不要在 git worktree 里跑 `xcodegen generate`：
# 它会把本地 package 引用的 `name` 字段按**当前目录名**写死（例如写成
# "issue-118-remove-blossom" 而非 "CoreDesign"），并顺带清空
# xcshareddata/xcschemes/CoreDesignPreview.xcscheme。
# 若必须在 worktree 里生成，事后手动把 name 改回 CoreDesign，
# 并 `git checkout HEAD -- App/CoreDesignPreview.xcodeproj/xcshareddata`。
name: CoreDesignPreview
options:
  bundleIdPrefix: com.coredesign
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"

packages:
  CoreDesign:
    path: ../
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    exactVersion: "0.14.0"

targets:
  CoreDesignPreview:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: CoreDesign
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"

  SnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CoreDesignPreview
      - package: SnapshotPreviews
        product: SnapshottingTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
