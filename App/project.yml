name: CoreDesignPreview
options:
  bundleIdPrefix: com.coredesign
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

packages:
  CoreDesign:
    path: ../
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    exactVersion: "0.14.0"

targets:
  CoreDesignPreview:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: CoreDesign
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
