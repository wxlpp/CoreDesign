name: CoreDesignPreview
options:
  bundleIdPrefix: com.coredesign
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

packages:
  CoreDesign:
    path: ../
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    exactVersion: "0.14.0"

targets:
  CoreDesignPreview:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: CoreDesign
      - package: SnapshotPreviews
        product: PreviewGallery
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"

  SnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CoreDesignPreview
      - package: SnapshotPreviews
        product: SnapshottingTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
